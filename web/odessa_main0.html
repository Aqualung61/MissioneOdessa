<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Missione Odessa - Gioco (legacy)</title>
  <link rel="stylesheet" href="css/base.css" />
  <style>
    :root {
      /* Colori principali */
      --page-bg: #006d77; /* Ottanio: adattato allo sfondo della stella */
      --ottanio: var(--page-bg);
      --black: #000000;
      --white: #ffffff;
      --dir-active: #D4A017; /* Ocra per le lettere attive */
      --dir-inactive: var(--black); /* Nero per le lettere inattive */
    }
    html, body { height: 100%; }
    body {
      margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: var(--page-bg);
      font-family: Aptos, "Segoe UI", Arial, sans-serif;
    }
    .layout { display: grid; grid-template-columns: 52% 48%; grid-template-rows: 100%; height: 100%; width: 100%; gap:16px; box-sizing:border-box; padding:16px; }
    .left { position:relative; height:100%; border:8px solid var(--ottanio); box-sizing:border-box; background:var(--ottanio); }
    .left img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .right { display:grid; grid-template-columns:1fr 260px; grid-template-rows:minmax(0,1fr) auto auto; grid-template-areas: "main dir" "input input" "lang lang"; height:100%; border:8px solid var(--ottanio); box-sizing:border-box; padding:16px; gap:16px; background:var(--ottanio); align-items:stretch; min-height:0; }
    #outputWrapper { grid-area:main; background:var(--white); color:#111; border:2px solid #e6e6e6; border-radius:4px; box-sizing:border-box; padding:16px; flex:1 1 auto; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
    #outputTitle { margin:0 0 8px 0; font-size:16px; font-weight:600; color:#333; }
    #output { flex:1 1 auto; overflow-y:auto; white-space:pre-line; font-size:16px; line-height:1.35; }
    #placeFeed { font-size:16px; line-height:1.4; }
    #placeFeed .entry { padding:8px 0 6px 0; }
    #placeFeed .entry-name { font-weight:600; margin-bottom:2px; }
    #placeFeed .entry-desc { white-space:pre-line; }
    #placeFeed .feed-msg { white-space:pre-line; padding:4px 0; }
    #placeFeed .feed-msg.info { color:#444; }
    #placeFeed .feed-msg.warn { color:#b26b00; }
    #placeFeed .feed-msg.error { color:#c62828; }
    #placeFeed .feed-msg.system { color:#0b5394; }
    #placeMsgs { display:none; }
    #inputBar { grid-area:input; background:var(--black); border-radius:4px; padding:12px; box-sizing:border-box; }
    #inputArea { display:flex; align-items:center; gap:10px; }
    #userInput { flex:1 1 auto; background:transparent; color:var(--white); border:1px solid #444; padding:10px 12px; font-size:16px; border-radius:4px; outline:none; }
    #userInput::placeholder { color:#bbb; }
    #sendBtn { background:#111; color:var(--white); border:1px solid #444; padding:10px 16px; font-size:16px; border-radius:4px; cursor:pointer; }
    #sendBtn:disabled { opacity:.5; cursor:not-allowed; }
    #linguaScelta { grid-area:lang; color:var(--white); font-weight:600; font-size:16px; padding-left:4px; }
    #rightColBox { grid-area:dir; display:flex; flex-direction:column; gap:10px; align-items:stretch; min-height:0; overflow:hidden; }
    #directionsPanel { background:var(--page-bg); border-radius:4px; padding:8px; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; flex:0 0 auto; }
    .starBox { position:relative; width:200px; height:200px; }
    .starBox img { width:100%; height:100%; object-fit:contain; display:block; }
    .starBox .dir { position:absolute; font-weight:800; font-size:22px; letter-spacing:1px; cursor:pointer; user-select:none; outline:none; }
    .starBox .N { top:6px; left:50%; transform:translateX(-50%); }
    .starBox .S { bottom:6px; left:50%; transform:translateX(-50%); }
    .starBox .E { top:50%; right:8px; transform:translateY(-50%); }
    .starBox .O { top:50%; left:8px; transform:translateY(-50%); }
    .starBox .active { color:var(--dir-active); text-shadow:0 0 2px rgba(0,0,0,.2); }
    .starBox .inactive { color:var(--dir-inactive); }
    .starBox .dir:focus { text-decoration:underline; }
    .v-indicators { margin-top:4px; display:flex; gap:14px; align-items:center; justify-content:center; color:var(--white); font-weight:600; }
    .v-item { display:flex; align-items:center; gap:10px; }
    .v-item .v-label { font-weight:800; font-size:22px; letter-spacing:1px; cursor:pointer; user-select:none; }
    .v-item .v-label.active { color:var(--dir-active); text-shadow:0 0 2px rgba(0,0,0,.2); }
    .v-item .v-label.inactive { color:var(--dir-inactive); }
    .dot { width:12px; height:12px; border-radius:50%; box-sizing:border-box; cursor:pointer; display:inline-block; }
    .dot.active { background:var(--dir-active); border:2px solid var(--dir-active); }
    .dot.inactive { background:var(--dir-inactive); border:2px solid var(--dir-inactive); }
    #sidePanel { background:var(--white); color:#111; border:2px solid #e6e6e6; border-radius:4px; box-sizing:border-box; padding:12px; display:flex; flex-direction:column; gap:12px; min-height:0; overflow:auto; }
    #sidePanel h3 { margin:0; font-size:15px; font-weight:700; color:#333; }
    .kv { display:grid; grid-template-columns:auto 1fr; gap:6px 10px; font-size:14px; }
    .kv .k { color:#666; }
    .kv .v { color:#111; text-align:right; }
    @media (max-width:1200px){ .layout { grid-template-columns:48% 52%; } }
    @media (max-width:900px){ .layout { grid-template-columns:44% 56%; } }
    @media (max-width:720px){ .layout { grid-template-columns:38% 62%; } #output { font-size:15px; } #userInput { font-size:15px; } #sendBtn { font-size:15px; }}
  </style>
</head>
<body>
  <div class="layout">
    <section class="left" aria-label="Immagine di Missione Odessa">
      <img src="../images/Missione Odessa Adventure - main.png" alt="Missione Odessa" />
    </section>

    <section class="right">
      <div id="outputWrapper">
        <h2 id="outputTitle" aria-hidden="true">Gioco</h2>
        <div id="output" style="display:none"></div>
        <div id="placeFeed" style="flex:1 1 auto; min-height:0; overflow-y:auto;"></div>
        <div id="placeMsgs" aria-live="polite" aria-atomic="false"></div>
      </div>

      <div id="inputBar">
        <form id="inputArea" autocomplete="off">
          <input id="userInput" type="text" placeholder="Dove vuoi andare? (Nord, Est, Sud, Ovest, Su, Giu | iniziali: N/E/O/S)" />
          <button id="sendBtn" type="submit">Invia</button>
        </form>
      </div>

      <div id="linguaScelta">Lingua selezionata:</div>

      <div id="rightColBox">
        <aside id="directionsPanel" aria-label="Direzioni">
          <div class="starBox">
            <img src="../images/Star.png" alt="Direzioni" />
            <span class="dir N inactive" role="button" tabindex="0" aria-label="Nord">N</span>
            <span class="dir E inactive" role="button" tabindex="0" aria-label="Est">E</span>
            <span class="dir S inactive" role="button" tabindex="0" aria-label="Sud">S</span>
            <span class="dir O inactive" role="button" tabindex="0" aria-label="Ovest">O</span>
          </div>
          <div class="v-indicators" aria-label="Verticale">
            <div class="v-item">
              <span id="dotSu" class="dot inactive" role="button" tabindex="0" title="Su"></span>
              <span id="labelSu" class="v-label inactive" role="button" tabindex="0" title="Su">Su</span>
            </div>
            <div class="v-item">
              <span id="dotGiu" class="dot inactive" role="button" tabindex="0" title="Giu"></span>
              <span id="labelGiu" class="v-label inactive" role="button" tabindex="0" title="Giu">Giu</span>
            </div>
          </div>
        </aside>

        <aside id="sidePanel" aria-label="Dettagli luogo">
        <h3>Dettagli</h3>
        <div class="kv">
          <div class="k">ID</div><div class="v" id="placeId">-</div>
          <div class="k">Nord</div><div class="v" id="vNord">0</div>
          <div class="k">Est</div><div class="v" id="vEst">0</div>
          <div class="k">Sud</div><div class="v" id="vSud">0</div>
          <div class="k">Ovest</div><div class="v" id="vOvest">0</div>
          <div class="k">Su</div><div class="v" id="vSu">0</div>
          <div class="k">Giu</div><div class="v" id="vGiu">0</div>
        </div>
        </aside>
      </div>
    </section>
  </div>

  <script>
    function getQueryParam(name){const url=new URL(window.location.href);return url.searchParams.get(name);} const idLingua=getQueryParam('idLingua')||localStorage.getItem('linguaSelezionata')||'0'; let descrizione=localStorage.getItem('linguaDescrizione')||''; function setLingua(t){const el=document.getElementById('linguaScelta'); if(el) el.textContent=t?('Lingua selezionata: '+t):'';} if(!descrizione && idLingua && idLingua!=='0'){fetch('/api/lingue').then(r=>r.json()).then(data=>{const lingua=data.find(l=>String(l.ID_Lingua??l.ID??l.id??l.Id)===idLingua); if(lingua){const nome=lingua.NomeLingua??lingua.Descrizione??lingua.nome??lingua.nomeLingua; descrizione=nome||''; if(descrizione){setLingua(descrizione); localStorage.setItem('linguaDescrizione',descrizione);}}}).catch(()=>{});} else if(descrizione){setLingua(descrizione);} 
  </script>
  <script src="js/odessa1.js?v=20251106_11" type="module"></script>
</body>
</html>
