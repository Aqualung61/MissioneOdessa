<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Missione Odessa - Adventure Game</title>
  <link rel="icon" href="../images/MissioneOdessa.ico" type="image/x-icon" />
  <script>
    // Detect base path dynamically - supporta qualsiasi path custom
    function getBasePath() {
      const pathParts = window.location.pathname.split('/').filter(p => p);
      const appFolders = ['web', 'images', 'src', 'api'];
      if (pathParts.length === 0 || appFolders.includes(pathParts[0])) {
        return '/';
      }
      return '/' + pathParts[0] + '/';
    }
    const basePath = getBasePath();
    window.basePath = basePath;

    // Se la pagina è aperta come file:// le API relative (/api/...) non funzionano.
    // Reindirizza automaticamente al server locale mantenendo i parametri query.
    (function(){
      try{
        if (location.protocol === 'file:'){
          var target = 'http://localhost:3001' + basePath + 'web/odessa_intro.html' + (location.search||'');
          location.replace(target);
        }
      }catch(e){}
    })();
  </script>
  <link rel="stylesheet" href="css/base.css" />
</head>
<body class="page-intro">

    <img id="mainImage" src="../images/MissioneOdessa_intro.png" alt="Missione Odessa" fetchpriority="low" />
    <div id="introduzione"></div>

  <script src="js/marked.min.js"></script>
  <script src="js/odessa_intro.js"></script>
  <!-- cache-bust -->
  <!-- Preload rimosso: l'immagine è decorativa (background CSS) e il preload generava warning non necessario -->
</body>
</html>
