<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Missione Odessa - Adventure Game</title>
  <link rel="icon" href="../images/MissioneOdessa.ico" type="image/x-icon" />
  <script>
    // Detect base path dynamically
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const basePath = pathParts.length > 0 && pathParts[0] === 'missioneodessa' ? '/' + pathParts[0] + '/' : '/';

    // Se la pagina è aperta come file:// le API relative (/api/...) non funzionano.
    // Reindirizza automaticamente al server locale mantenendo i parametri query.
    (function(){
      try{
        if (location.protocol === 'file:'){
          var target = 'http://localhost:3001' + basePath + 'web/odessa_intro.html' + (location.search||'');
          location.replace(target);
        }
      }catch(e){}
    })();
  </script>
  <script>
    // Log dei parametri ricevuti da index.html
    console.log('Parametri ricevuti:', location.search);
  </script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/odessa_main.css" />
  <style>
    html, body {
      overflow: auto; /* Permette lo scroll solo se necessario */
      margin: 0; /* Rimuove margini predefiniti */
      padding: 0; /* Rimuove padding predefiniti */
    }

    body {
      align-items: center;
      margin: 0;
      background: var(--page-bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #mainImage {
      width: auto; /* Mantiene la proporzione dell'immagine */
      max-width: 75%; /* Limita la larghezza al 75% della viewport per non superare il div introduzione */
      max-height: 75vh; /* Limita l'altezza al 75% della viewport height */
      margin-top: 10px; /* Distanza di 10px dal bordo superiore */
      display: block; /* Assicura che l'immagine sia un elemento a blocco */
      margin-left: auto; /* Centra orizzontalmente */
      margin-right: auto; /* Centra orizzontalmente */
      flex-shrink: 0; /* Impedisce che l'immagine si riduca */
      /* transition: opacity 0.2s ease; - rimossa definitivamente */
    }

    #introduzione {
      max-width: 75%; /* Larghezza massima al 75% della pagina */
      text-align: justify; /* Giustifica il testo */
      margin-left: auto; /* Centra orizzontalmente */
      margin-right: auto; /* Centra orizzontalmente */
      padding: 0 0 50px 0; /* Aggiunge 50px di padding bottom per spazio all'ultima riga */
      flex: 1; /* Occupa il resto dello spazio disponibile */
      overflow-y: visible; /* Permette che il contenuto si espanda senza scroll interno */
    }

    #introduzione * {
      margin: 0; /* Rimuove margini da tutti gli elementi figli */
      padding: 0; /* Rimuove padding da tutti gli elementi figli */
    }

    #introduzione p {
      margin: 0 0 10px; /* Riduce i margini tra i paragrafi */
    }

    /* Transizione per fading rimossa definitivamente per compatibilità con scroll */
    /* #introduzione {
      transition: opacity 0.2s ease;
    } */
  </style>
</head>
<body>

    <img id="mainImage" src="../images/MissioneOdessa-Mainimage.png" alt="Missione Odessa" />
    <div id="introduzione"></div>

  <script src="js/marked.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const introduzioneDiv = document.getElementById('introduzione');
      let currentIntro = 1;

      // Fetch e mostra il testo di introduzione ID=1 con leggero delay per uniformità
      setTimeout(() => {
        loadIntroduzione(1);
      }, 100);

      function loadIntroduzione(id) {
        fetch(basePath + 'api/introduzione?id=' + id + '&lingua=1')
          .then(res => res.json())
          .then(data => {
            const testo = (data.testo || '').replace(/\\n/g, '\n'); // Corretto il parsing delle nuove righe
            const lines = testo.split('\n');
            if (id === 1 || id === 2) {
              lines[lines.length - 1] = `<a href="#" onclick="nextStage()" style='background-color: red; color: white; text-decoration: none; margin: 10px; padding: 5px;' onmouseover="this.style.backgroundColor='darkred';" onmouseout="this.style.backgroundColor='red';">${lines[lines.length - 1]}</a>`;
            } else {
              lines[lines.length - 1] = `<a href='${basePath}web/odessa_main.html${location.search}' style='background-color: red; color: white; text-decoration: none; margin: 10px; padding: 5px;' onmouseover="this.style.backgroundColor='darkred';" onmouseout="this.style.backgroundColor='red';">${lines[lines.length - 1]}</a>`;
            }
            const parsedHTML = marked.parse(lines.join('\n'));
            // Senza fading per compatibilità con scroll
            introduzioneDiv.style.display = 'none';
            setTimeout(() => {
              introduzioneDiv.innerHTML = parsedHTML;
              introduzioneDiv.style.display = '';
              window.scrollTo(0, 0);
            }, 10);
          })
          .catch(err => {
            console.error('Errore nel caricamento dell\'introduzione:', err);
          });
      }

      window.nextStage = function() {
        if (currentIntro === 1) {
          // Cambia immagine senza fading
          document.getElementById('mainImage').src = '../images/Simon Wiesenthal.png';
          document.getElementById('mainImage').alt = 'Simon Wiesenthal';
          // Carica testo ID=2
          loadIntroduzione(2);
          currentIntro = 2;
        } else if (currentIntro === 2) {
          // Sostituisci con due immagini affiancate
          const imageContainer = document.getElementById('mainImage').parentNode;
          document.getElementById('mainImage').style.display = 'none';
          const dualImages = document.createElement('div');
          dualImages.id = 'dualImages';
          dualImages.style.display = 'flex';
          dualImages.style.justifyContent = 'center';
          dualImages.style.gap = '20px';
          dualImages.style.marginTop = '10px';
          dualImages.innerHTML = `
            <img src="../images/Simon Wiesenthal.png" alt="Simon Wiesenthal" style="max-width: 35%; max-height: 75vh; flex-shrink: 0;" />
            <img src="../images/1948 - Berlin map.png" alt="1948 - Berlin map" style="max-width: 35%; max-height: 75vh; flex-shrink: 0;" />
          `;
          imageContainer.insertBefore(dualImages, document.getElementById('mainImage'));
          // Carica testo ID=3
          loadIntroduzione(3);
          currentIntro = 3;
        }
      };
    });
  </script>
  <!-- cache-bust -->
  <!-- Preload rimosso: l'immagine è decorativa (background CSS) e il preload generava warning non necessario -->
  <!-- <script src="js/odessa1.js?v=20251106_12" type="module"></script> -->
</body>
</html>
