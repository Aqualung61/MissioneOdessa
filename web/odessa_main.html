<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Missione Odessa - Adventure Game</title>
  <script>
    // Se la pagina è aperta come file:// le API relative (/api/...) non funzionano.
    // Reindirizza automaticamente al server locale mantenendo i parametri query.
    (function(){
      try{
        if (location.protocol === 'file:'){
          var target = 'http://localhost:3001/web/odessa_main.html' + (location.search||'');
          location.replace(target);
        }
      }catch(e){}
    })();
  </script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/odessa_main.css" />
  <style>
    /* Modifica per mostrare la barra di scorrimento verticale solo se necessario */
    body {
      overflow-y: auto;
    }
    /* Aggiunta barra di scorrimento orizzontale per l'intera finestra del browser */
    body {
      overflow-x: auto;
    }
    /* Cambiato il colore dell'ombra in bianco per l'immagine dinamica */
    #dynamicPlaceImage {
      box-shadow: 0px 8px 16px rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="left" aria-label="Luoghi Missione Odessa">
      <div class="temp-img-wrapper" style="text-align:center; margin-bottom:16px;">
        <img id="dynamicPlaceImage" src="" alt="Immagine del luogo" style="max-width:100%; height:auto; border-radius:8px; display:none;" />
      </div>
    </section>
    <section class="right">
      <div id="outputWrapper">
        <!-- Riquadro descrizioni e feed del gioco -->
        <div id="placeFeed" style="flex:1 1 auto; min-height:0; overflow-y:auto;"></div>
        <!-- Output principale del gioco (descrizione luogo attuale) -->
        <div id="output"></div>
        <!-- Messaggi di sistema, azioni, feedback -->
        <div id="placeMsgs" aria-live="polite" aria-atomic="false"></div>
      </div>
      <div id="inputBar">
        <!-- Area di input per i comandi dell'utente -->
        <form id="inputArea" autocomplete="off">
          <input id="userInput" type="text" placeholder="Dove vuoi andare? (Nord, Est, Sud, Ovest, Su, Giu | iniziali: N/E/S/O)" />
          <button id="sendBtn" type="submit">Invia</button>
        </form>
      </div>
      <div id="linguaScelta">Lingua selezionata:</div>
  <!-- Lingua selezionata dall'utente -->
  <div id="linguaScelta">Lingua selezionata:</div>
  <!-- Versione attuale dell'app -->
  <div id="versioneRunning" style="font-size:0.9em;color:#666;margin-top:2px;"></div>
      <aside id="squarePanel" aria-hidden="true">
        <!-- Pannello direzioni di movimento -->
        <div class="vg-letters" aria-hidden="true">
          <span class="vlet N disabled" title="Nord">N</span>
          <span class="vlet E disabled" title="Est">E</span>
          <span class="vlet S disabled" title="Sud">S</span>
          <span class="vlet O disabled" title="Ovest">O</span>
        </div>
        <div class="vg-controls" aria-hidden="true">
          <div class="vg-item disabled"><span class="vg-dot disabled" title="Su"></span><span class="vg-label disabled" title="Su">Su</span></div>
          <div class="vg-item disabled"><span class="vg-dot disabled" title="Giu"></span><span class="vg-label disabled" title="Giu">Giu</span></div>
        </div>
      </aside>
    </section>
  </div>

  <script>
    // Mostra la lingua scelta (descrizione) sotto la barra input
    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }
    const idLingua = getQueryParam('idLingua') || localStorage.getItem('linguaSelezionata') || '1';
    let descrizione = localStorage.getItem('linguaDescrizione') || '';
    function setLingua(text) {
      const el = document.getElementById('linguaScelta');
      if (el) el.textContent = text ? ('Lingua selezionata: ' + text) : '';
    }

    // Mostra la versione running sotto la lingua
    function setVersioneRunning(ver) {
      const el = document.getElementById('versioneRunning');
      if (el) el.textContent = ver ? ('Versione: ' + ver) : '';
    }

    // Recupera la versione dall'API
    fetch('/api/version')
      .then(res => res.json())
      .then(data => {
        if (data && data.version) setVersioneRunning(data.version);
      })
      .catch(() => setVersioneRunning('non disponibile'));
  // --- fine fetch versione ---
    if (!descrizione && idLingua && idLingua !== '0') {
      fetch('/api/lingue')
        .then(res => res.json())
        .then(data => {
          const lingua = data.find(l => String(l.ID_Lingua ?? l.ID ?? l.id ?? l.Id) === idLingua);
          if (lingua) {
            const nome = lingua.NomeLingua ?? lingua.Descrizione ?? lingua.nome ?? lingua.nomeLingua;
            descrizione = nome || '';
            if (descrizione) {
              setLingua(descrizione);
              localStorage.setItem('linguaDescrizione', descrizione);
            }
          }
        })
        .catch(() => {});
    } else if (descrizione) {
      setLingua(descrizione);
    }
  </script>
  <!-- cache-bust -->
  <!-- Preload rimosso: l'immagine è decorativa (background CSS) e il preload generava warning non necessario -->
  <script src="js/odessa1.js?v=20251106_12" type="module"></script>
</body>
</html>
