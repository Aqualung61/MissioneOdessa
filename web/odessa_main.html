<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Missione Odessa: avventura testuale interattiva." />
  <meta name="theme-color" content="#000000" />
  <title>Missione Odessa - Adventure Game</title>
  <link rel="icon" href="../images/MissioneOdessa.ico" type="image/x-icon" />
  <script src="js/bootstrap.js"></script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/odessa_main.css" />
</head>
  <body class="page-main">
  <header class="visually-hidden">
    <h1>Missione Odessa</h1>
  </header>
  <main class="layout">
    <section class="left" aria-label="Luoghi Missione Odessa">
        <div class="temp-img-wrapper">
          <img id="dynamicPlaceImage" src="" alt="Immagine del luogo" width="1024" height="1024" decoding="async" />
          <div id="placeNameOverlay"></div>
      </div>
      <!-- Numero luoghi visitati -->
        <div id="visitedCount" class="hud-stat"></div>
      <!-- Numero interazioni -->
        <div id="interactionsCount" class="hud-stat"></div>
      <!-- Numero misteri -->
        <div id="mysteriesCount" class="hud-stat"></div>
      <!-- Punteggio totale -->
        <div id="scoreCount" class="hud-stat hud-stat--score"></div>
      <!-- Livello/Rango -->
        <div id="rankCount" class="hud-stat hud-stat--rank"></div>
    </section>
    <section class="right">
      <div id="outputWrapper">
        <!-- Riquadro descrizioni e feed del gioco -->
          <div id="placeFeed"></div>
        <!-- Output principale del gioco (descrizione luogo attuale) -->
        <div id="output"></div>
        <!-- Messaggi di sistema, azioni, feedback -->
        <div id="placeMsgs" aria-live="polite" aria-atomic="false"></div>
      </div>
      <div id="inputBar">
        <!-- Area di input per i comandi dell'utente -->
        <form id="inputArea" autocomplete="off">
          <label for="userInput" class="visually-hidden">Comando</label>
          <input id="userInput" type="text" placeholder="Inserisci un comando (es. Nord, Inventario, Esamina Lampada)" autocomplete="off" autocapitalize="none" spellcheck="false" enterkeyhint="send" />
          <button id="sendBtn" type="submit">Invia</button>
        </form>
      </div>
      <div id="linguaScelta">Lingua selezionata:</div>
      <!-- Versione attuale dell'app -->
      <div id="versioneRunning"></div>
    </section>
  </main>
  <!-- cache-bust -->
  <!-- Preload rimosso: l'immagine è decorativa (background CSS) e il preload generava warning non necessario -->
  <script src="js/odessa_main.js?v=20251106_12" type="module"></script>
</body>
</html>
