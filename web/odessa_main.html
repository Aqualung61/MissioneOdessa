<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <meta name="theme-color" content="#000000" />

  <meta property="og:locale" content="it_IT" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Missione Odessa" />
  <meta property="og:title" content="Missione Odessa - Adventure Game" />
  <meta property="og:description" content="Missione Odessa: avventura testuale interattiva." />
  <meta property="og:url" content="https://missioneodessa.up.railway.app/web/odessa_main.html" />
  <meta property="og:image" content="https://missioneodessa.up.railway.app/images/MissioneOdessa_intro.png" />
  <meta property="og:image:alt" content="Missione Odessa" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Missione Odessa - Adventure Game" />
  <meta name="twitter:description" content="Missione Odessa: avventura testuale interattiva." />
  <meta name="twitter:image" content="https://missioneodessa.up.railway.app/images/MissioneOdessa_intro.png" />
  <title>Missione Odessa - Adventure Game</title>
  <link rel="icon" href="../images/MissioneOdessa.ico" type="image/x-icon" />
  <script src="js/bootstrap.js"></script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/odessa_main.css" />
</head>
  <body class="page-main">
  <header class="visually-hidden">
    <h1>Missione Odessa</h1>
  </header>
  <noscript>
    <p>
      Questa pagina richiede JavaScript per funzionare.
      Puoi tornare a <a href="../index.html">Missione Odessa</a> oppure aprire <a href="odessa_intro.html?idLingua=1">l’introduzione</a>.
    </p>
  </noscript>
  <main class="layout">
    <section class="left" aria-label="Luoghi Missione Odessa">
        <div class="temp-img-wrapper">
          <img id="dynamicPlaceImage" src="" alt="Immagine del luogo" width="1024" height="1024" decoding="async" />
          <div id="placeNameOverlay"></div>
      </div>
      <!-- Numero luoghi visitati -->
        <div id="visitedCount" class="hud-stat"></div>
      <!-- Numero interazioni -->
        <div id="interactionsCount" class="hud-stat"></div>
      <!-- Numero misteri -->
        <div id="mysteriesCount" class="hud-stat"></div>
      <!-- Punteggio totale -->
        <div id="scoreCount" class="hud-stat hud-stat--score"></div>
      <!-- Livello/Rango -->
        <div id="rankCount" class="hud-stat hud-stat--rank"></div>
    </section>
    <section class="right" aria-label="Console di gioco">
      <div id="outputWrapper" aria-label="Output di gioco">
        <!-- Riquadro descrizioni e feed del gioco -->
          <div id="placeFeed" role="log" aria-live="polite" aria-relevant="additions text" aria-atomic="false"></div>
        <!-- Output principale del gioco (descrizione luogo attuale) -->
        <div id="output" role="region" aria-label="Descrizione del luogo"></div>
        <!-- Messaggi di sistema, azioni, feedback -->
        <div id="placeMsgs" aria-live="polite" aria-atomic="false"></div>
      </div>
      <div id="inputBar">
        <!-- Area di input per i comandi dell'utente -->
        <form id="inputArea" autocomplete="off">
          <label for="userInput" class="visually-hidden">Comando</label>
          <input id="userInput" type="text" placeholder="Inserisci un comando (es. Nord, Inventario, Esamina Lampada)" autocomplete="off" autocapitalize="none" spellcheck="false" enterkeyhint="send" />
          <button id="sendBtn" type="submit">Invia</button>
        </form>
      </div>
      <div id="linguaScelta">Lingua selezionata:</div>
      <!-- Versione attuale dell'app -->
      <div id="versioneRunning"></div>
    </section>
  </main>
  <!-- cache-bust -->
  <!-- Preload rimosso: l'immagine è decorativa (background CSS) e il preload generava warning non necessario -->
  <script src="js/odessa_main.js?v=20251106_12" type="module"></script>
</body>
</html>
